<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>perf769.github.io</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --ink: #17201b;
        --muted: #667069;
        --green: #0f6b4d;
        --line: #dfe5dd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        padding: 11px 16px;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Посадочные страницы</h1>
      <p>Анализ домов и коттеджей у Брянска для компании на 31 июля - 2 августа 2026.</p>
      <a href="/bryansk-cottages-2026/">Открыть отчет</a>
    </main>
  </body>
</html>
